<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PromptShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <div class="logo-ring">
          <!-- Yellow Shield Icon (Outlined) -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff8c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <div class="app-name">
            PromptShield
            <!-- Blue Verified Checkmark -->
            <svg class="verified-icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#00d4ff"/>
            </svg>
          </div>
          <div class="app-sub">AI Data Loss Prevention</div>
        </div>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <!-- ── Gateway Status Card ── -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-dot offline" id="status-dot"></span>
        <div>
          <div class="status-label">GATEWAY</div>
          <div class="status-value offline" id="status-text">GATEWAY OFFLINE</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shield-toggle" checked>
        <span class="track"><span class="thumb"></span></span>
      </label>
    </div>

    <!-- ── Stats Grid ── -->
    <div class="section-label">PROTECTION SUMMARY</div>
    <div class="stats-grid">
      <!-- Row 1: Large Card -->
      <div class="stat-card accent">
        <div class="stat-num" id="stat-total">837</div>
        <div class="stat-name">Total Redacted</div>
      </div>
      <!-- Row 2: 3 Stat Tiles -->
      <div class="stat-card c-cyan row-3">
        <div class="stat-num" id="stat-keys">83</div>
        <div class="stat-name">API Keys</div>
      </div>
      <div class="stat-card c-rose row-3">
        <div class="stat-num" id="stat-phi">77</div>
        <div class="stat-name">PHI / Health</div>
      </div>
      <div class="stat-card c-emerald row-3">
        <div class="stat-num" id="stat-financial">82</div>
        <div class="stat-name">Financial</div>
      </div>
      <!-- Row 3: 2 Stat Tiles -->
      <div class="stat-card c-violet row-2">
        <div class="stat-num" id="stat-pii">122</div>
        <div class="stat-name">PII</div>
      </div>
      <div class="stat-card c-amber row-2">
        <div class="stat-num" id="stat-creds">20</div>
        <div class="stat-name">Credentials</div>
      </div>
    </div>

    <!-- ── Recent Activity ── -->
    <div class="section-label" style="margin-top:16px">RECENT ACTIVITY</div>
    <div class="feed" id="feed">
      <div class="feed-empty">No activity yet</div>
    </div>

    <!-- ── Footer ── -->
    <div class="footer">
      <button class="btn-reset" id="btn-reset">Reset Statistics</button>
      <div class="footer-note" id="footer-note">Backend offline — local masking active</div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
