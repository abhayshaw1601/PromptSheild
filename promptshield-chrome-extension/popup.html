<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PromptShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     SCREEN 1 — OVERVIEW
══════════════════════════════════════════════════════════ -->
<div class="screen active" id="screen-overview">
  <div class="topbar">
    <div class="topbar-left">
      <div class="app-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.35C16.5 21.15 20 16.25 20 11V5l-8-3z" fill="rgba(59,130,246,0.25)" stroke="#3b82f6" stroke-width="1.8"/><polyline points="9,12 11,14 15,10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><div class="app-title">PromptShield</div><div class="app-sub">AI Data Loss Prevention</div></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btn-settings" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" title="More">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
    </div>
  </div>

  <div class="scroll-area">
    <!-- Status card -->
    <div class="status-card" id="status-card">
      <div class="status-shield" id="status-shield">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.35C16.5 21.15 20 16.25 20 11V5l-8-3z" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1.8"/><polyline points="9,12 11,14 15,10" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="status-body">
        <div class="status-title" id="status-title">Protected</div>
        <div class="status-sub"><span class="pulse-dot" id="pulse-dot"></span><span id="status-sub-text">Monitoring Active</span></div>
        <div class="status-desc" id="status-desc">All prompts are protected and sensitive data is blocked.</div>
      </div>
    </div>
    <div class="status-footer">
      <span class="status-time"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg> <span id="last-checked">Just now</span></span>
      <button class="link-btn" id="btn-view-details">View details <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg></button>
    </div>

    <!-- Items protected -->
    <div class="metric-card">
      <div class="metric-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="18" y="3" width="4" height="18" rx="1"/><rect x="10" y="8" width="4" height="13" rx="1"/><rect x="2" y="13" width="4" height="8" rx="1"/></svg></div>
      <div class="metric-body">
        <div class="metric-num" id="metric-total">0</div>
        <div class="metric-label">Items Protected</div>
      </div>
      <div class="metric-badge" id="metric-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18,15 12,9 6,15"/></svg> <span id="metric-pct">0%</span></div>
    </div>

    <!-- Recent Activity -->
    <div class="section-header">
      <span class="section-title">Recent Activity</span>
      <button class="l
      <div class="stat-card c-emerald">
        <div class="stat-num" id="stat-financial">0</div>
        <div class="stat-name">Financial</div>
      </div>
      <div class="stat-card c-violet">
        <div class="stat-num" id="stat-pii">0</div>
        <div class="stat-name">PII</div>
      </div>
      <div class="stat-card c-amber">
        <div class="stat-num" id="stat-creds">0</div>
        <div class="stat-name">Credentials</div>
      </div>
    </div>

    <!-- ── Recent Activity ── -->
    <div class="section-label" style="margin-top:14px">RECENT ACTIVITY</div>
    <div class="feed" id="feed">
      <div class="feed-empty">No activity yet</div>
    </div>

    <!-- ── Footer ── -->
    <div class="footer">
      <button class="btn-reset" id="btn-reset">Reset Statistics</button>
      <div class="footer-note" id="footer-note">Local firewall active on port 5000</div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
