<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PromptShield</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <div class="logo-ring">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.35C16.5 21.15 20 16.25 20 11V5l-8-3z"
              fill="rgba(245,197,24,0.18)" stroke="#F5C518" stroke-width="1.8" stroke-linejoin="round"/>
            <polyline points="9,12 11,14 15,10" stroke="#F5C518" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="app-name">PromptShield <span class="copy">&copy;</span></div>
          <div class="app-sub">AI Data Loss Prevention</div>
        </div>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <!-- ── Gateway Status ── -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-dot" id="status-dot"></span>
        <div>
          <div class="status-label">GATEWAY</div>
          <div class="status-value" id="status-text">CHECKING...</div>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shield-toggle" checked>
        <span class="track"><span class="thumb"></span></span>
      </label>
    </div>

    <!-- ── Stats Grid ── -->
    <div class="section-label">PROTECTION SUMMARY</div>
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-name">Total Redacted</div>
      </div>
      <div class="stat-card c-cyan">
        <div class="stat-num" id="stat-keys">0</div>
        <div class="stat-name">API Keys</div>
      </div>
      <div class="stat-card c-rose">
        <div class="stat-num" id="stat-phi">0</div>
        <div class="stat-name">PHI / Health</div>
      </div>
      <div class="stat-card c-emerald">
        <div class="stat-num" id="stat-financial">0</div>
        <div class="stat-name">Financial</div>
      </div>
      <div class="stat-card c-violet">
        <div class="stat-num" id="stat-pii">0</div>
        <div class="stat-name">PII</div>
      </div>
      <div class="stat-card c-amber">
        <div class="stat-num" id="stat-creds">0</div>
        <div class="stat-name">Credentials</div>
      </div>
    </div>

    <!-- ── Recent Activity ── -->
    <div class="section-label" style="margin-top:14px">RECENT ACTIVITY</div>
    <div class="feed" id="feed">
      <div class="feed-empty">No activity yet</div>
    </div>

    <!-- ── Footer ── -->
    <div class="footer">
      <button class="btn-reset" id="btn-reset">Reset Statistics</button>
      <div class="footer-note" id="footer-note">Local firewall active on port 5000</div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
